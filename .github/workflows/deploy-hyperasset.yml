name: Deploy Hyperasset to Azure Storage

on:
  push:
    branches:
      - main

jobs:
  deploy-hyperassets:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout du repo pour avoir les fichiers
      - uses: actions/checkout@v3

      # 2️⃣ Login Azure via secret
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3️⃣ Upload vers Azure Storage
      - name: Upload hyperassets to Azure Blob Storage (DEV)
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING_DEV }}" \
              --destination '$web' \
              --source ./hyperassets \
              --destination-path hyperasset \
              --overwrite



