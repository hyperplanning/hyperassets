name: Deploy Hyperassets

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload hyperassets DEV
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "Contenu du dossier hyperassets :"
            ls -l ./hyperassets
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING_DEV }}" \
              --destination '$web' \
              --source ./hyperassets \
              --destination-path hyperasset \
              --overwrite
