name: Deploy Hyperassets

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: List hyperassets
        run: |
          echo "Contenu du repo :"
          ls -l
          echo "Contenu du dossier hyperassets :"
          ls -l ./hyperassets

      # 4️⃣ Upload DEV
      - name: Upload hyperassets to DEV
        run: |
          az storage blob upload-batch \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING_DEV }}" \
            --destination '$web' \
            --source ./hyperassets \
            --destination-path hyperasset \
            --overwrite

